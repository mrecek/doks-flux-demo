---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: uptime-kuma-cloud-backup
  namespace: uptime-kuma-cloud
  labels:
    app.kubernetes.io/name: uptime-kuma-cloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: uptime-kuma-cloud-backup
  namespace: uptime-kuma-cloud
  labels:
    app.kubernetes.io/name: uptime-kuma-cloud
rules:
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: uptime-kuma-cloud-backup
  namespace: uptime-kuma-cloud
  labels:
    app.kubernetes.io/name: uptime-kuma-cloud
subjects:
  - kind: ServiceAccount
    name: uptime-kuma-cloud-backup
    namespace: uptime-kuma-cloud
roleRef:
  kind: Role
  name: uptime-kuma-cloud-backup
  apiGroup: rbac.authorization.k8s.io
