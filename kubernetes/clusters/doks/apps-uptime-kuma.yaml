---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-uptime-kuma
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-edge
  interval: 10m
  path: ./kubernetes/clusters/doks/apps/uptime-kuma-cloud
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
  healthChecks:
    - apiVersion: apps/v1
      kind: StatefulSet
      name: uptime-kuma-cloud
      namespace: uptime-kuma-cloud
