---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 30m
  chart:
    spec:
      chart: tailscale-operator
      version: "1.96.x"
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    installCRDs: true
    operatorConfig:
      hostname: doks-flux-demo-operator
      defaultTags:
        - tag:k8s-operator
      logging: info
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi
    proxyConfig:
      defaultTags: "tag:k8s"
    apiServerProxyConfig:
      allowImpersonation: "false"
      mode: "false"
