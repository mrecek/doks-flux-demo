---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-uptime-kuma-backups
  namespace: flux-system
spec:
  dependsOn:
    - name: apps-uptime-kuma
  interval: 10m
  path: ./kubernetes/clusters/doks/apps/uptime-kuma-cloud/backups
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
  healthChecks:
    - apiVersion: batch/v1
      kind: CronJob
      name: uptime-kuma-cloud-backup
      namespace: uptime-kuma-cloud
